<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>World Cup 2026 — Prediction Game</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0d1117; --card:#161b22; --line:#262d36; --txt:#e6edf3; --mut:#8b949e;
    --accent:#22c55e; --accent2:#3b82f6; --gold:#facc15; --danger:#f87171; --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
       background:var(--bg);color:var(--txt);padding-bottom:78px}
  .wrap{max-width:560px;margin:0 auto;padding:14px}
  h1,h2,h3{margin:0 0 8px}
  .head{display:flex;align-items:center;justify-content:space-between;padding:14px;
        background:linear-gradient(135deg,#1d4ed8,#16a34a);border-radius:var(--radius);margin-bottom:14px}
  .head h1{font-size:18px}
  .head small{color:#dbeafe;display:block;font-weight:400;font-size:12px}
  .who{font-size:12px;background:rgba(0,0,0,.25);padding:5px 10px;border-radius:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
        padding:14px;margin-bottom:12px}
  .meta{display:flex;justify-content:space-between;color:var(--mut);font-size:12px;margin-bottom:10px}
  .match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .team{font-weight:600;font-size:15px}
  .team.h{text-align:right}
  .score-in{width:46px;height:46px;text-align:center;font-size:20px;font-weight:700;
        border-radius:10px;border:1px solid var(--line);background:#0d1117;color:var(--txt)}
  .vs{display:flex;align-items:center;gap:6px}
  .badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#0d1117;border:1px solid var(--line);color:var(--mut)}
  .locked{opacity:.6}
  .advance{display:flex;gap:6px;margin-top:10px;justify-content:center}
  .advance button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--line);
        background:#0d1117;color:var(--mut);font-size:13px}
  .advance button.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .save{width:100%;margin-top:10px;padding:11px;border:none;border-radius:10px;
        background:var(--accent);color:#04210f;font-weight:700;font-size:14px}
  .save:disabled{background:#1f2937;color:var(--mut)}
  .pts{font-weight:700}
  .pts.win{color:var(--accent)}.pts.exact{color:var(--gold)}.pts.miss{color:var(--mut)}
  .result{text-align:center;font-size:13px;color:var(--mut);margin-top:8px}
  .nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--card);
       border-top:1px solid var(--line)}
  .nav button{flex:1;padding:11px 4px;border:none;background:none;color:var(--mut);font-size:11px}
  .nav button.on{color:var(--accent)}
  .nav .ic{font-size:19px;display:block;margin-bottom:2px}
  .lb{display:flex;align-items:center;padding:11px 12px;border-bottom:1px solid var(--line)}
  .lb:last-child{border:none}
  .rank{width:30px;font-weight:700;color:var(--mut)}
  .lb .nm{flex:1;font-weight:600}
  .lb .tot{font-weight:800;font-size:17px}
  .lb .sub{font-size:11px;color:var(--mut)}
  .lb.me{background:rgba(34,197,94,.08)}
  .gold{color:var(--gold)}
  .crowd-toggle{margin-top:10px;display:inline-block;background:#0d1117;border:1px solid var(--line);color:var(--accent2);
        border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
  .crowd-wrap{text-align:center}
  .crowd-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;margin-top:8px;border-top:1px solid var(--line);padding-top:8px}
  .crow{display:flex;align-items:center;flex-wrap:wrap;gap:2px 6px;padding:4px;font-size:13px;border-radius:6px}
  .crow .nm{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .crow .sc{color:var(--mut);font-variant-numeric:tabular-nums}
  .crow .pt{width:22px;text-align:right}
  .crow .adv{flex-basis:100%;color:var(--mut);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .crow.me{background:rgba(34,197,94,.10)}
  .ep-h{font-size:13px;font-weight:700;margin:0 0 10px}
  .brow{padding:8px 4px;border-bottom:1px solid #20262e}
  .brow:last-child{border:none}
  .brow.me{background:rgba(34,197,94,.10);border-radius:8px;padding-left:8px;padding-right:8px}
  .bname{font-weight:600;font-size:14px}
  .bpicks{color:var(--mut);font-size:13px;margin-top:2px}
  input,select{font-family:inherit}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:13px;color:var(--mut);margin-bottom:5px}
  .field input,.field select{width:100%;padding:11px;border-radius:10px;
        border:1px solid var(--line);background:#0d1117;color:var(--txt);font-size:15px}
  .err{background:rgba(248,113,113,.12);color:var(--danger);padding:10px;border-radius:10px;
       font-size:13px;margin-bottom:10px}
  .ok{background:rgba(34,197,94,.12);color:var(--accent);padding:10px;border-radius:10px;
      font-size:13px;margin-bottom:10px}
  .empty{text-align:center;color:var(--mut);padding:40px 16px;font-size:14px}
  .day-h{font-size:13px;color:var(--mut);margin:16px 4px 8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .center{text-align:center}
  .logo{font-size:40px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ===================== CONFIG — FILL THESE IN =====================
const SUPABASE_URL  = "https://gawwhkjlcybkfbhksdut.supabase.co";
const SUPABASE_ANON = "sb_publishable_zm_QPfhp9LJZyLFwK7TMkg_WqoGkThE";
const GROUP_NAME    = 'Party Rockerz';     // shown in the header to identify this group
// ----- Crowd predictions (Matches tab) -----
const REVEAL_MODE   = 'after_kickoff';   // 'always' = show picks as soon as made | 'after_kickoff' = only once locked | 'off' = never
const CROWD_WINDOW_H = 50;          // only show picks for matches within ±this many hours of now
// ----- Daily Recap (top of Predict tab) -----
const RECAP_WINDOW_H = 27;          // recap covers matches finished in the last ~24h (24h + ~3h max match length, since we filter by kickoff)
// =================================================================

const { useState, useEffect, useRef } = React;
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const fmtDay = (iso) => new Date(iso).toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
const fmtTime = (iso) => new Date(iso).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
const within48h = (iso) => { const k=new Date(iso),n=new Date(); return k>n && k <= new Date(n.getTime()+48*3600*1000); };
const isPast = (iso) => new Date(iso) <= new Date();

function App(){
  const [me,setMe] = useState(JSON.parse(localStorage.getItem('wc_me_v2')||'null'));
  const [tab,setTab] = useState('predict');
  if(!me) return <Login onIn={(m)=>{localStorage.setItem('wc_me_v2',JSON.stringify(m));setMe(m);}}/>;
  return (
    <div className="wrap">
      <div className="head">
        <div><h1>⚽ World Cup 2026</h1><small>{GROUP_NAME} · Prediction Game</small></div>
        <span className="who" onClick={()=>{if(confirm('Switch user?')){localStorage.removeItem('wc_me_v2');setMe(null);}}}>{me.name} 🔄</span>
      </div>
      {tab==='predict'   && <Predict me={me}/>}
      {tab==='results'   && <Results me={me}/>}
      {tab==='bonus'     && <Bonus me={me}/>}
      {tab==='board'     && <Board me={me}/>}
      <nav className="nav">
        <button className={tab==='predict'?'on':''} onClick={()=>setTab('predict')}><span className="ic">📝</span>Predict</button>
        <button className={tab==='results'?'on':''} onClick={()=>setTab('results')}><span className="ic">📅</span>Matches</button>
        <button className={tab==='bonus'?'on':''}   onClick={()=>setTab('bonus')}><span className="ic">🏆</span>Bonus</button>
        <button className={tab==='board'?'on':''}    onClick={()=>setTab('board')}><span className="ic">📊</span>Leaderboard</button>
      </nav>
    </div>
  );
}

function Login({onIn}){
  const [name,setName]=useState(''),[pin,setPin]=useState(''),[err,setErr]=useState(''),[busy,setBusy]=useState(false);
  const ready=name.trim()&&pin.trim();
  const go=async()=>{
    setErr('');setBusy(true);
    const {data,error}=await db.rpc('verify_login',{p_name:name.trim(),p_pin:pin.trim()});
    setBusy(false);
    if(error) return setErr(error.message);
    if(!data||!data.length) return setErr('Name or PIN is incorrect.');
    onIn(data[0]);
  };
  return (
    <div className="wrap">
      <div className="center" style={{margin:'30px 0'}}>
        <div className="logo">⚽</div>
        <h1>World Cup 2026</h1>
        <p style={{color:'var(--mut)'}}>Prediction Game</p>
      </div>
      <div className="card">
        {err && <div className="err">{err}</div>}
        <div className="field"><label>Your name</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name here"/></div>
        <div className="field"><label>Your PIN</label>
          <input value={pin} inputMode="numeric" type="password" autoComplete="off"
            onChange={e=>setPin(e.target.value.replace(/\D/g,'').slice(0,3))} placeholder="Your secret PIN"
            onKeyDown={e=>e.key==='Enter'&&ready&&!busy&&go()}/></div>
        <button className="save" onClick={go} disabled={busy||!ready}>{busy?'Checking…':'Enter'}</button>
      </div>
    </div>
  );
}

// -------- DAILY RECAP: "last night" highlights, shown atop Predict --------
function Recap(){
  const [d,setD]=useState(null);
  useEffect(()=>{(async()=>{
    const since=Date.now()-RECAP_WINDOW_H*3600*1000;   // matches finished in the last ~24h
    const {data:ms}=await db.from('matches').select('*').eq('status','FINISHED').order('kickoff_at',{ascending:false});
    const recent=(ms||[]).filter(m=>new Date(m.kickoff_at).getTime()>=since && m.home_score!=null);
    if(!recent.length){setD({empty:true});return;}
    const ids=recent.map(m=>m.id);
    const [{data:ps},{data:mem},{data:st}]=await Promise.all([
      db.from('predictions').select('*').in('match_id',ids),
      db.from('members').select('id,name'),
      db.from('settings').select('exact_points').eq('id',1).single(),
    ]);
    const ep=(st&&st.exact_points)||10;
    const nameOf={}; (mem||[]).forEach(x=>nameOf[x.id]=x.name);
    const preds=ps||[];
    const sharp=[...new Set(preds.filter(p=>p.points===ep).map(p=>nameOf[p.member_id]).filter(Boolean))];
    const earned={}; preds.forEach(p=>{earned[p.member_id]=(earned[p.member_id]||0)+(p.points||0);});
    let topPts=0; Object.values(earned).forEach(v=>{if(v>topPts)topPts=v;});
    // Top earner = everyone tied for the highest total (no single winner when others match it).
    const topNames=topPts>0?Object.keys(earned).filter(id=>earned[id]===topPts).map(id=>nameOf[id]).filter(Boolean):[];
    let bm=-1;
    preds.forEach(p=>{const g=Math.abs(p.pred_home-p.pred_away);if(g>bm)bm=g;});
    // Boldest = everyone who made the biggest-margin call, but only a real gamble (4+ goal margin) qualifies.
    const boldPicks=bm>=4?preds.filter(p=>Math.abs(p.pred_home-p.pred_away)===bm):[];
    let bold=null;
    if(boldPicks.length){
      const f=boldPicks[0], cat=p=>p.points===0?'flop':(p.points>=ep?'nailed':'paid');
      const sameScore=boldPicks.every(p=>p.pred_home===f.pred_home&&p.pred_away===f.pred_away);
      bold={
        names:[...new Set(boldPicks.map(p=>nameOf[p.member_id]).filter(Boolean))],
        margin:bm,
        pred_home:sameScore?f.pred_home:null,
        pred_away:sameScore?f.pred_away:null,
        match_id:boldPicks.every(p=>p.match_id===f.match_id)?f.match_id:null,
        react:boldPicks.every(p=>cat(p)===cat(f))?cat(f):null,
      };
    }
    const spoon=Object.keys(earned).filter(id=>earned[id]===0).map(id=>nameOf[id]).filter(Boolean);
    // Craziest = every prediction with a 6+ goal total, listed name/score/match (sorted wildest-first).
    const crazy=preds.filter(p=>(p.pred_home||0)+(p.pred_away||0)>=6)
      .map(p=>({name:nameOf[p.member_id],ph:p.pred_home,pa:p.pred_away,match_id:p.match_id,total:(p.pred_home||0)+(p.pred_away||0)}))
      .filter(x=>x.name)
      .sort((a,b)=>b.total-a.total);
    setD({recent,sharp,topNames,topPts,bold,crazy,spoon,nameOf,ep});
  })();},[]);
  if(!d||d.empty) return null;
  const showBold=!!d.bold;   // someone made a real gamble (3+ goal margin)
  const bMatch=showBold&&d.bold.match_id!=null&&d.recent.find(m=>m.id===d.bold.match_id);
  const reactTxt={flop:' …ouch 😬',nailed:' — and NAILED it! 🤯🔥',paid:' — and it paid off! 👏'};
  const bReact=showBold&&d.bold.react?reactTxt[d.bold.react]:'';
  const bDesc=showBold?(d.bold.pred_home!=null?` ${d.bold.pred_home}–${d.bold.pred_away}`:` ${d.bold.margin}-goal calls`):'';
  const any=d.sharp.length||(d.topNames.length>0&&d.topPts>0)||showBold||d.crazy.length||d.spoon.length;
  return (
    <div style={{background:'linear-gradient(135deg,#1d4ed8,#16a34a)',borderRadius:14,padding:'12px 14px',marginBottom:14,color:'#fff'}}>
      <div style={{fontWeight:800,fontSize:15,marginBottom:8}}>☀️ Last Night's Damage</div>
      <div style={{fontSize:13,lineHeight:1.6}}>
        {d.recent.slice(0,6).map(m=>(
          <div key={m.id} style={{opacity:.95}}>⚽ {m.home_team} {m.home_score}–{m.away_score} {m.away_team}</div>
        ))}
        {d.recent.length>6 && <div style={{opacity:.85}}>＋{d.recent.length-6} more matches</div>}
      </div>
      {any?
      <div style={{fontSize:13,lineHeight:1.7,marginTop:8,borderTop:'1px solid rgba(255,255,255,.25)',paddingTop:8}}>
        {d.sharp.length>0 && <div>🎯 Nailed it: <b>{d.sharp.join(', ')}</b>{d.sharp.length>1?' — sharpshooters! 🔥':' — bang on! 👌'}</div>}
        {d.topNames.length>0 && d.topPts>0 && <div>🏆 Top earner{d.topNames.length>1?'s':''}: <b>{d.topNames.join(', ')}</b> (+{d.topPts} pts)</div>}
        {showBold && <div>🦁 Boldest: <b>{d.bold.names.join(', ')}</b>{bDesc}{bMatch?` (${bMatch.home_team} v ${bMatch.away_team})`:''}{bReact}</div>}
        {d.crazy.length>0 && <div>🤪 Craziest: {d.crazy.map((c,i)=>{const mt=d.recent.find(m=>m.id===c.match_id);return <React.Fragment key={i}>{i>0?', ':''}<b>{c.name}</b> {c.ph}–{c.pa}{mt?` (${mt.home_team} v ${mt.away_team})`:''}</React.Fragment>;})}</div>}
        {d.spoon.length>0 && <div>🦆 Ducks - 0 pts: <b>{d.spoon.length<=4?d.spoon.join(', '):d.spoon.length+' players'}</b>{d.spoon.length>8?' — brutal night! 😵':''}</div>}
      </div>:null}
    </div>
  );
}

// -------- PREDICT: only matches kicking off in the next 48h --------
function Predict({me}){
  const [matches,setMatches]=useState(null),[preds,setPreds]=useState({});
  const load=async()=>{
    const {data:ms}=await db.from('matches').select('*').order('kickoff_at');
    const {data:ps}=await db.from('predictions').select('*').eq('member_id',me.id);
    const map={}; (ps||[]).forEach(p=>map[p.match_id]=p); setPreds(map);
    setMatches((ms||[]).filter(m=>{
      const live=m.status==='IN_PLAY'||(m.status!=='FINISHED'&&isPast(m.kickoff_at));
      return (within48h(m.kickoff_at)&&m.status==='SCHEDULED')||live;
    }));
  };
  useEffect(()=>{load();},[]);
  return <>
    <Recap/>
    {matches===null
      ? <div className="empty">Loading…</div>
      : !matches.length
        ? <div className="empty">No matches open for prediction right now.<br/>Matches open 2 days before kickoff. Check back soon! ⏰</div>
        : <>
            <div style={{background:'var(--card)',border:'1px solid var(--line)',borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:13}}>
              <div style={{color:'var(--txt)',marginBottom:4}}>⏱ Open until match kickoff</div>
              <div style={{color:'var(--gold)'}}>🎯 Exact score + correct advancer = 10 pts</div>
              <div style={{color:'#f59e0b'}}>🥅 Exact score, wrong advancer = 5 pts</div>
              <div style={{color:'var(--accent)'}}>✅ Correct advancer only = 2 pts</div>
            </div>
            {matches.map(m=><MatchCard key={m.id} m={m} pred={preds[m.id]} me={me} onSaved={load}/>)}
          </>}
  </>;
}

function MatchCard({m,pred,me}){
  const live = m.status==='IN_PLAY'||(m.status!=='FINISHED'&&isPast(m.kickoff_at));
  const [h,setH]=useState(pred?String(pred.pred_home):''),[a,setA]=useState(pred?String(pred.pred_away):'');
  const [adv,setAdv]=useState(pred?pred.pred_winner:null),[msg,setMsg]=useState(''),[busy,setBusy]=useState(false),[everSaved,setEverSaved]=useState(!!pred);
  const tie = h!==''&&a!==''&&Number(h)===Number(a);
  const winner = tie ? (m.is_knockout?adv:'DRAW') : (Number(h)>Number(a)?'HOME':'AWAY');
  const valid = h!==''&&a!==''&&(!m.is_knockout||!tie||adv);
  const save=async()=>{
    setMsg('');setBusy(true);
    const {error}=await db.from('predictions').upsert(
      {member_id:me.id,match_id:m.id,pred_home:Number(h),pred_away:Number(a),pred_winner:winner},
      {onConflict:'member_id,match_id'});
    setBusy(false);
    if(!error)setEverSaved(true);
    setMsg(error?('⚠ '+error.message):'✓ Saved');
    setTimeout(()=>setMsg(''),2500);
  };
  return (
    <div className={`card${live?' locked':''}`}>
      <div className="meta"><span>{m.group_name?m.group_name.replace(/_/g,' '):m.stage.replace(/_/g,' ')}</span>
        <span>{live?<span style={{color:'var(--danger)',fontWeight:700}}>🔴 LIVE</span>:`${fmtDay(m.kickoff_at)} · ${fmtTime(m.kickoff_at)}`}</span></div>
      <div className="match">
        <span className="team h">{m.home_team}</span>
        <span className="vs">
          <input className="score-in" inputMode="numeric" disabled={live} value={h} onChange={e=>setH(e.target.value.replace(/\D/g,'').slice(0,2))}/>
          <span style={{color:'var(--mut)'}}>:</span>
          <input className="score-in" inputMode="numeric" disabled={live} value={a} onChange={e=>setA(e.target.value.replace(/\D/g,'').slice(0,2))}/>
        </span>
        <span className="team">{m.away_team}</span>
      </div>
      {m.is_knockout && tie && !live &&
        <div className="advance">
          <button className={adv==='HOME'?'on':''} onClick={()=>setAdv('HOME')}>{m.home_team} go through</button>
          <button className={adv==='AWAY'?'on':''} onClick={()=>setAdv('AWAY')}>{m.away_team} go through</button>
        </div>}
      {msg && <div className={msg[0]==='✓'?'ok':'err'} style={{marginTop:10,marginBottom:0}}>{msg}</div>}
      {!live && <button className="save" disabled={!valid||busy} onClick={save}>{busy?'Saving…':(everSaved?'Update prediction':'Save prediction')}</button>}
      {live && pred && <div className="result">Your prediction: {pred.pred_home} – {pred.pred_away}</div>}
      {live && !pred && <div className="result" style={{color:'var(--danger)'}}>No prediction submitted</div>}
    </div>
  );
}

// -------- CROWD PICKS: everyone's predictions for a match (collapsible) --------
function CrowdPicks({crowd,nameOf,rankOf,done,meId,revealScores,m}){
  const [open,setOpen]=useState(false);
  if(!crowd.length) return null;
  // Sort: by points earned (desc) once finished & revealed, else by leaderboard rank.
  const sorted=[...crowd].sort((a,b)=>(revealScores&&done)
    ? ((b.points||0)-(a.points||0))
    : ((rankOf[a.member_id]||999)-(rankOf[b.member_id]||999)));
  const label=revealScores?`${open?'Hide':'See'} ${crowd.length} picks`:`${crowd.length} predicted`;
  return (
    <>
      <div className="crowd-wrap">
        <button className="crowd-toggle" onClick={()=>setOpen(o=>!o)}>👥 {label} {open?'▲':'▼'}</button>
      </div>
      {open && <>
        <div className="crowd-grid">
          {sorted.map(p=>{
            const mine=p.member_id===meId;
            const cls=done?(p.points>=10?'exact':p.points>0?'win':'miss'):'';
            return <div className={'crow'+(mine?' me':'')} key={p.member_id}>
              <span className="nm">{nameOf[p.member_id]||'?'}{mine?' (you)':''}</span>
              {revealScores && <span className="sc">{p.pred_home}–{p.pred_away}</span>}
              {revealScores && done ? <span className="pt"><span className={'pts '+cls}>{p.points}</span></span> : null}
              {revealScores && m && m.is_knockout && p.pred_home===p.pred_away && (p.pred_winner==='HOME'||p.pred_winner==='AWAY') &&
                <span className="adv">⬆️ {p.pred_winner==='HOME'?m.home_team:m.away_team}</span>}
            </div>;
          })}
        </div>
        {!revealScores && <div style={{textAlign:'center',color:'var(--mut)',fontSize:11,marginTop:6}}>🔒 Scores reveal at kickoff</div>}
      </>}
    </>
  );
}

// -------- MATCHES: all fixtures, my pick & points (daily progress) --------
function Results({me}){
  const [matches,setMatches]=useState(null),[preds,setPreds]=useState({});
  const [crowdBy,setCrowdBy]=useState({}),[nameOf,setNameOf]=useState({}),[rankOf,setRankOf]=useState({});
  const dayRef=useRef(null);
  const winMs=CROWD_WINDOW_H*3600*1000;
  const inWindow=(iso)=>Math.abs(new Date(iso).getTime()-Date.now())<=winMs;
  useEffect(()=>{(async()=>{
    const {data:ms}=await db.from('matches').select('*').order('kickoff_at');
    const {data:ps}=await db.from('predictions').select('*').eq('member_id',me.id);
    const map={};(ps||[]).forEach(p=>map[p.match_id]=p);setPreds(map);setMatches(ms||[]);
    if(REVEAL_MODE!=='off'){
      const winMatches=(ms||[]).filter(m=>inWindow(m.kickoff_at));
      if(winMatches.length){
        const lockedNow=m=>isPast(m.kickoff_at)||m.status!=='SCHEDULED';
        const reveal=m=>REVEAL_MODE==='always'||(REVEAL_MODE==='after_kickoff'&&lockedNow(m));
        const fullIds=winMatches.filter(reveal).map(m=>m.id);          // scores allowed -> fetch full
        const whoIds =winMatches.filter(m=>!reveal(m)).map(m=>m.id);   // pre-kickoff -> fetch only who predicted
        const fullQ=fullIds.length?db.from('predictions').select('*').in('match_id',fullIds):Promise.resolve({data:[]});
        const whoQ =whoIds.length ?db.from('predictions').select('member_id,match_id').in('match_id',whoIds):Promise.resolve({data:[]});
        const [{data:apsFull},{data:apsWho},{data:mem},{data:lb}]=await Promise.all([
          fullQ, whoQ,
          db.from('members').select('id,name'),
          db.from('leaderboard').select('id'),
        ]);
        const by={};
        (apsFull||[]).forEach(p=>{(by[p.match_id]=by[p.match_id]||[]).push(p);});
        (apsWho||[]).forEach(p=>{(by[p.match_id]=by[p.match_id]||[]).push(p);});
        setCrowdBy(by);
        const nm={};(mem||[]).forEach(x=>nm[x.id]=x.name);setNameOf(nm);
        const rk={};(lb||[]).forEach((r,i)=>rk[r.id]=i+1);setRankOf(rk);
      }
    }
  })();},[]);
  // Auto-scroll to the current day's matches whenever the Matches tab opens.
  useEffect(()=>{
    if(dayRef.current) requestAnimationFrame(()=>{ if(dayRef.current) dayRef.current.scrollIntoView({block:'start'}); });
  },[matches,crowdBy]);
  if(matches===null) return <div className="empty">Loading…</div>;
  if(!matches.length) return <div className="empty">Fixtures not loaded yet.</div>;
  let lastDay='';
  const startToday=new Date();startToday.setHours(0,0,0,0);
  const target=matches.find(m=>new Date(m.kickoff_at).getTime()>=startToday.getTime());
  const targetId=target?target.id:null;
  return <>{matches.map(m=>{
    const d=fmtDay(m.kickoff_at),show=d!==lastDay;lastDay=d;
    const p=preds[m.id],done=m.status==='FINISHED';
    const cls=p&&done?(p.points>=10?'exact':p.points>0?'win':'miss'):'';
    const locked=isPast(m.kickoff_at)||m.status!=='SCHEDULED';
    const revealScores=REVEAL_MODE==='always'||(REVEAL_MODE==='after_kickoff'&&locked);
    const showCrowd=REVEAL_MODE!=='off'&&inWindow(m.kickoff_at);
    return <React.Fragment key={m.id}>
      {show&&<div className="day-h" ref={m.id===targetId?dayRef:undefined}>{d}</div>}
      <div className="card">
        <div className="meta"><span>{m.group_name?m.group_name.replace(/_/g,' '):m.stage.replace(/_/g,' ')}</span>
          <span>{done?'FT':(isPast(m.kickoff_at)?'LIVE':fmtTime(m.kickoff_at))}</span></div>
        <div className="match">
          <span className="team h">{m.home_team}</span>
          <span className="vs"><b style={{fontSize:18}}>{done?`${m.home_score} : ${m.away_score}`:'– : –'}</b></span>
          <span className="team">{m.away_team}</span>
        </div>
        {p
          ? <div className="result">You: {p.pred_home}–{p.pred_away}
              {m.is_knockout&&p.pred_home===p.pred_away?` (${p.pred_winner==='HOME'?m.home_team:m.away_team})`:''}
              {done&&<> · <span className={'pts '+cls}>{p.points} pts</span></>}</div>
          : <div className="result">{isPast(m.kickoff_at)?'No prediction':'Not predicted yet'}</div>}
        {showCrowd && <CrowdPicks crowd={crowdBy[m.id]||[]} nameOf={nameOf} rankOf={rankOf} done={done} meId={me.id} revealScores={revealScores} m={m}/>}
      </div>
    </React.Fragment>;
  })}</>;
}

// -------- BONUS: champion / golden boot / golden glove --------
function Bonus({me}){
  const [b,setB]=useState({champion:'',golden_boot:'',golden_glove:''}),[locked,setLocked]=useState(false);
  const [msg,setMsg]=useState(''),[busy,setBusy]=useState(false),[lock,setLock]=useState(null),[everSaved,setEverSaved]=useState(false);
  const [revealed,setRevealed]=useState(false),[revealAt,setRevealAt]=useState(null);
  const [members,setMembers]=useState([]),[allPicks,setAllPicks]=useState([]),[whoIds,setWhoIds]=useState([]);
  useEffect(()=>{(async()=>{
    const {data:st}=await db.from('settings').select('tournament_start_at,bonus_lock_at,bonus_reveal_at').eq('id',1).single();
    const effLock  = st?(st.bonus_lock_at||st.tournament_start_at):null;
    const effReveal= st?(st.bonus_reveal_at||st.bonus_lock_at||st.tournament_start_at):null;
    const lk=!!effLock&&isPast(effLock), rv=!!effReveal&&isPast(effReveal);
    setLock(effLock);setLocked(lk);setRevealed(rv);setRevealAt(effReveal);
    const {data}=await db.from('bonus_predictions').select('*').eq('member_id',me.id).maybeSingle();
    if(data){setB({champion:data.champion||'',golden_boot:data.golden_boot||'',golden_glove:data.golden_glove||''});setEverSaved(true);}
    const {data:mem}=await db.from('members').select('id,name');setMembers(mem||[]);
    if(rv){ const {data:all}=await db.from('bonus_predictions').select('*'); setAllPicks(all||[]); }
    else  { const {data:who}=await db.from('bonus_predictions').select('member_id'); setWhoIds((who||[]).map(x=>x.member_id)); }
  })();},[]);
  const save=async()=>{setMsg('');setBusy(true);
    const {error}=await db.from('bonus_predictions').upsert({member_id:me.id,...b},{onConflict:'member_id'});
    setBusy(false);
    if(!error)setEverSaved(true);
    setMsg(error?('⚠ '+error.message):'✓ Saved');setTimeout(()=>setMsg(''),2500);
  };
  const nameOf={}; members.forEach(m=>nameOf[m.id]=m.name);
  const submitted=members.filter(m=>whoIds.includes(m.id)), pending=members.filter(m=>!whoIds.includes(m.id));
  return (
    <>
    <div className="card">
      <h3>🎁 Special prizes</h3>
      <p style={{color:'var(--mut)',fontSize:13}}>
        {locked?'🔒 Locked — picks are closed.':
         lock?`Open until: ${fmtDay(lock)} ${fmtTime(lock)}`:'Make your picks before the tournament starts.'}</p>
      <p style={{color:'var(--mut)',fontSize:13,marginTop:-4}}>Get these right and you win an individual prize — separate from the main leaderboard.</p>
      {msg&&<div className={msg[0]==='✓'?'ok':'err'}>{msg}</div>}
      <div className="field"><label>🏆 Tournament winner</label>
        <input disabled={locked} value={b.champion} onChange={e=>setB({...b,champion:e.target.value})} placeholder="Country"/></div>
      <div className="field"><label>👟 Golden Boot — top scorer</label>
        <input disabled={locked} value={b.golden_boot} onChange={e=>setB({...b,golden_boot:e.target.value})} placeholder="Player name"/></div>
      <div className="field"><label>🧤 Golden Glove — best keeper</label>
        <input disabled={locked} value={b.golden_glove} onChange={e=>setB({...b,golden_glove:e.target.value})} placeholder="Player name"/></div>
      {!locked&&<button className="save" disabled={busy} onClick={save}>{busy?'Saving…':(everSaved?'Update picks':'Save picks')}</button>}
    </div>

    <div className="card">
      <div className="ep-h">👥 Everyone's picks{revealed&&allPicks.length?<span style={{color:'var(--mut)',fontWeight:400}}> · {allPicks.length} players</span>:null}</div>
      {revealed ? (
        allPicks.length===0 ? <p style={{color:'var(--mut)',fontSize:13,margin:0}}>No picks were made.</p> :
        [...allPicks].sort((x,y)=>(nameOf[x.member_id]||'').localeCompare(nameOf[y.member_id]||'')).map(p=>{
          const mine=p.member_id===me.id;
          return <div className={'brow'+(mine?' me':'')} key={p.member_id}>
            <div className="bname">{nameOf[p.member_id]||'?'}{mine?' (you)':''}</div>
            <div className="bpicks">🏆 {p.champion||'—'} · 👟 {p.golden_boot||'—'} · 🧤 {p.golden_glove||'—'}</div>
          </div>;
        })
      ) : (
        <div style={{fontSize:14,lineHeight:1.5}}>
          <div style={{fontWeight:700,fontSize:15}}>{submitted.length} of {members.length} have locked in their picks ✅</div>
          <div style={{color:'var(--mut)',fontSize:13,marginTop:8}}>
            ✓ {submitted.map(m=>m.name+(m.id===me.id?' (you)':'')).join(', ')||'—'}
            {pending.length>0 && <><br/>⏳ Still to pick: {pending.map(m=>m.name).join(', ')}</>}
          </div>
          <div style={{color:'var(--gold)',fontSize:12,marginTop:10}}>🔒 Everyone's picks reveal {revealAt?`on ${fmtDay(revealAt)} ${fmtTime(revealAt)}`:'when the tournament kicks off'}</div>
        </div>
      )}
    </div>
    </>
  );
}

// -------- LEADERBOARD --------
function Board({me}){
  const [rows,setRows]=useState(null);
  useEffect(()=>{(async()=>{const {data}=await db.from('leaderboard').select('*');setRows(data||[]);})();},[]);
  if(rows===null) return <div className="empty">Loading…</div>;
  if(!rows.length) return <div className="empty">No players yet.</div>;
  return (
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      {rows.map((r,i)=>(
        <div className={'lb'+(r.id===me.id?' me':'')} key={r.id}>
          <span className="rank">{i+1}</span>
          <span className="nm">{r.name}
            <span className="sub"> · <span style={{color:'var(--mut)'}}>{r.matches_played} Played</span> · <span style={{color:r.matches_scored>0?'var(--accent)':'var(--mut)'}}>{r.matches_scored} Scored</span> · <span style={{color:r.exact_hits>0?'var(--gold)':'var(--mut)'}}>{r.exact_hits} Exact</span></span></span>
          <span className="tot">{r.total_points}</span>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
